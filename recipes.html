<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Receptenboek</title>
<style>
:root {
  --page: #f9f9f7;
  --surface: #fcfcfb;
  --ink: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --hairline: #e1e0d9;
  --ring: rgba(11,11,11,0.10);
  --accent: #2a78d6;
  --accent-ink: #ffffff;
  --protein: #2a78d6;
  --carbs: #1baf7a;
  --fat: #eda100;
  --chip-bg: #f0efec;
  --shadow: 0 1px 2px rgba(11,11,11,.05), 0 8px 24px rgba(11,11,11,.07);
  --shadow-lift: 0 2px 4px rgba(11,11,11,.06), 0 16px 40px rgba(11,11,11,.13);
  --overlay: rgba(11,11,11,.45);
}
[data-theme="dark"] {
  --page: #0d0d0d;
  --surface: #1a1a19;
  --ink: #ffffff;
  --ink-2: #c3c2b7;
  --muted: #898781;
  --hairline: #2c2c2a;
  --ring: rgba(255,255,255,0.10);
  --accent: #3987e5;
  --accent-ink: #ffffff;
  --protein: #3987e5;
  --carbs: #199e70;
  --fat: #c98500;
  --chip-bg: #262624;
  --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  --shadow-lift: 0 2px 4px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.5);
  --overlay: rgba(0,0,0,.6);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hairline: #2c2c2a;
    --ring: rgba(255,255,255,0.10);
    --accent: #3987e5;
    --accent-ink: #ffffff;
    --protein: #3987e5;
    --carbs: #199e70;
    --fat: #c98500;
    --chip-bg: #262624;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
    --shadow-lift: 0 2px 4px rgba(0,0,0,.4), 0 16px 40px rgba(0,0,0,.5);
    --overlay: rgba(0,0,0,.6);
  }
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  background: var(--page);
  color: var(--ink);
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: none;
}
button { font: inherit; color: inherit; }

/* ---------- header ---------- */
header {
  position: sticky; top: 0; z-index: 20;
  background: color-mix(in srgb, var(--page) 82%, transparent);
  -webkit-backdrop-filter: saturate(1.4) blur(14px);
  backdrop-filter: saturate(1.4) blur(14px);
  border-bottom: 1px solid var(--hairline);
  padding: calc(10px + env(safe-area-inset-top)) 16px 10px;
}
.head-row { display: flex; align-items: baseline; gap: 10px; max-width: 1200px; margin: 0 auto; }
h1 { font-size: 22px; margin: 0; letter-spacing: -0.02em; }
.count { color: var(--muted); font-size: 13px; flex: 1; }
.theme-btn {
  border: 1px solid var(--hairline); background: var(--surface);
  border-radius: 999px; width: 34px; height: 34px; cursor: pointer;
  display: grid; place-items: center; font-size: 16px; line-height: 1;
  align-self: center;
}
.controls { max-width: 1200px; margin: 10px auto 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.search {
  flex: 1 1 220px; min-width: 0;
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: 12px; padding: 9px 12px;
}
.search svg { flex: none; color: var(--muted); }
.search input {
  border: 0; outline: 0; background: transparent; color: var(--ink);
  font: inherit; font-size: 16px; width: 100%; padding: 0;
}
.search input::placeholder { color: var(--muted); }
select.sort {
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: 12px;
  padding: 9px 10px; font-size: 14px; max-width: 46vw;
}
.chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip {
  border: 1px solid var(--hairline); background: var(--surface);
  border-radius: 999px; padding: 8px 13px; font-size: 13.5px; cursor: pointer;
  color: var(--ink-2); transition: background .15s, color .15s, border-color .15s;
  white-space: nowrap;
}
.chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }

/* ---------- macro filter panel ---------- */
.filter-panel {
  max-width: 1200px; margin: 10px auto 0;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 12px 14px; padding: 14px; background: var(--surface);
  border: 1px solid var(--hairline); border-radius: 14px; box-shadow: var(--shadow);
}
.filter-panel[hidden] { display: none; }
.filter-panel .range { display: flex; flex-direction: column; gap: 7px; }
.filter-panel .range > span { font-size: 13px; font-weight: 600; color: var(--ink-2); }
.filter-panel .range > span small { font-weight: 400; color: var(--muted); }
.filter-panel .inputs { display: flex; align-items: center; gap: 8px; }
.filter-panel .dash { color: var(--muted); }
.filter-panel input[type="number"] {
  width: 100%; min-width: 0; -moz-appearance: textfield; appearance: textfield;
  background: var(--page); color: var(--ink);
  border: 1px solid var(--hairline); border-radius: 9px;
  padding: 8px 9px; font: inherit; font-size: 16px; outline: 0;
}
.filter-panel input[type="number"]:focus { border-color: var(--accent); }
.filter-panel input[type="number"]::-webkit-outer-spin-button,
.filter-panel input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.filter-panel .reset {
  grid-column: 1 / -1; justify-self: end;
  border: 1px solid var(--hairline); background: var(--page); color: var(--ink-2);
  border-radius: 999px; padding: 8px 16px; font-size: 13.5px; cursor: pointer;
}
.filter-panel .reset:hover { border-color: var(--accent); color: var(--accent); }

/* ---------- grid ---------- */
main { max-width: 1200px; margin: 0 auto; padding: 18px 16px calc(40px + env(safe-area-inset-bottom)); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
@media (max-width: 480px) { .grid { grid-template-columns: 1fr; gap: 14px; } }

.card {
  background: var(--surface); border: 1px solid var(--ring);
  border-radius: 16px; overflow: hidden; cursor: pointer;
  box-shadow: var(--shadow);
  transition: transform .18s ease, box-shadow .18s ease;
  display: flex; flex-direction: column;
  text-align: left; padding: 0;
}
@media (hover: hover) {
  .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
}
.card:active { transform: scale(.985); }
.card-img {
  aspect-ratio: 4 / 3; width: 100%; object-fit: cover; display: block;
  background: var(--chip-bg);
}
.card-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
.card h3 { margin: 0; font-size: 16px; line-height: 1.3; letter-spacing: -0.01em; }
.card p.desc {
  margin: 0; color: var(--ink-2); font-size: 13px; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.meta { display: flex; gap: 12px; color: var(--muted); font-size: 12.5px; margin-top: auto; }
.meta b { color: var(--ink); font-weight: 600; }
.macro-bar { display: flex; height: 6px; border-radius: 4px; overflow: hidden; gap: 2px; }
.macro-bar span { border-radius: 2px; }
.macro-bar .p { background: var(--protein); }
.macro-bar .c { background: var(--carbs); }
.macro-bar .f { background: var(--fat); }
.empty { color: var(--muted); text-align: center; padding: 60px 20px; font-size: 15px; }
.notice {
  background: var(--chip-bg); border: 1px solid var(--hairline); border-radius: 14px;
  padding: 12px 16px; margin: 0 0 16px; font-size: 14px; line-height: 1.5; color: var(--ink-2);
}

/* ---------- detail overlay ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 50; background: var(--overlay);
  display: none; align-items: flex-start; justify-content: center;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0;
}
.overlay.open { display: flex; }
@media (min-width: 720px) { .overlay { padding: 40px 20px; } }
.sheet {
  background: var(--page); width: 100%; max-width: 760px; min-height: 100%;
  position: relative;
  animation: rise .22s ease;
}
@media (min-width: 720px) {
  .sheet { border-radius: 20px; min-height: 0; box-shadow: var(--shadow-lift); overflow: hidden; }
}
@keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
.hero { position: relative; }
.hero img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; display: block; background: var(--chip-bg); }
.close-btn {
  position: absolute; top: calc(12px + env(safe-area-inset-top)); right: 12px;
  width: 38px; height: 38px; border-radius: 999px; border: 0; cursor: pointer;
  background: rgba(11,11,11,.55); color: #fff; font-size: 18px;
  display: grid; place-items: center;
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
}
@media (min-width: 720px) { .close-btn { top: 12px; } }
.sheet-body { padding: 18px 18px calc(30px + env(safe-area-inset-bottom)); }
@media (min-width: 720px) { .sheet-body { padding: 22px 26px 30px; } }
.sheet h2 { margin: 0 0 6px; font-size: 24px; letter-spacing: -0.02em; line-height: 1.2; }
.sheet .desc-full { color: var(--ink-2); font-size: 14.5px; line-height: 1.55; margin: 0 0 14px; }
.facts { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.fact {
  background: var(--chip-bg); border-radius: 999px; padding: 6px 12px;
  font-size: 13px; color: var(--ink-2); display: flex; gap: 6px; align-items: center;
}
.fact b { color: var(--ink); font-weight: 600; }

/* macro tiles */
.tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }
@media (max-width: 420px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
.tile {
  background: var(--surface); border: 1px solid var(--ring); border-radius: 14px;
  padding: 10px 12px;
}
.tile .lbl { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.tile .lbl i { width: 8px; height: 8px; border-radius: 999px; display: inline-block; }
.tile .val { font-size: 20px; font-weight: 650; letter-spacing: -0.02em; margin-top: 2px; }
.tile .val small { font-size: 12px; font-weight: 500; color: var(--muted); }
.energy-note { color: var(--muted); font-size: 11.5px; margin: 6px 0 18px; }
.energy-bar { display: flex; height: 10px; border-radius: 6px; overflow: hidden; gap: 2px; margin-top: 10px; }
.energy-bar span { border-radius: 3px; }

/* sections */
.sec-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 20px 0 10px; }
.sec-head h4 { margin: 0; font-size: 16px; letter-spacing: -0.01em; }
.stepper { display: flex; align-items: center; gap: 2px; background: var(--chip-bg); border-radius: 999px; padding: 3px; }
.stepper button {
  width: 30px; height: 30px; border-radius: 999px; border: 0; background: transparent;
  cursor: pointer; font-size: 17px; color: var(--ink); display: grid; place-items: center;
}
.stepper button:disabled { opacity: .3; }
.stepper .n { font-size: 13.5px; min-width: 72px; text-align: center; color: var(--ink-2); }
.stepper .n b { color: var(--ink); }

.ing-list { list-style: none; margin: 0; padding: 0; border: 1px solid var(--ring); border-radius: 14px; background: var(--surface); overflow: hidden; }
.ing-list li { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-top: 1px solid var(--hairline); }
.ing-list li:first-child { border-top: 0; }
.ing-list label { display: flex; align-items: center; gap: 10px; flex: 1; cursor: pointer; min-width: 0; }
.ing-list input { width: 18px; height: 18px; accent-color: var(--accent); flex: none; }
.ing-name { font-size: 14.5px; min-width: 0; }
.ing-name .brand { color: var(--muted); font-size: 12px; }
.ing-list li.checked .ing-name { text-decoration: line-through; color: var(--muted); }
.badge {
  font-size: 10.5px; padding: 2px 7px; border-radius: 999px;
  background: var(--chip-bg); color: var(--muted); flex: none;
}
.ing-amt { margin-left: auto; color: var(--ink-2); font-size: 13.5px; font-variant-numeric: tabular-nums; white-space: nowrap; }

.steps-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.steps-list li {
  display: flex; gap: 12px; background: var(--surface); border: 1px solid var(--ring);
  border-radius: 14px; padding: 12px 14px; cursor: pointer;
}
.step-num {
  flex: none; width: 26px; height: 26px; border-radius: 999px;
  background: var(--chip-bg); color: var(--ink-2); font-size: 13px; font-weight: 600;
  display: grid; place-items: center; transition: background .15s, color .15s;
}
.steps-list li.done .step-num { background: var(--accent); color: var(--accent-ink); }
.step-text { font-size: 14.5px; line-height: 1.55; color: var(--ink); }
.steps-list li.done .step-text { color: var(--muted); }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }
.legend span { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-2); }
.legend i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>

<header>
  <div class="head-row">
    <h1>Receptenboek</h1>
    <span class="count" id="count"></span>
    <button class="theme-btn" id="themeBtn" title="Licht/donker" aria-label="Wissel licht/donker thema">◐</button>
  </div>
  <div class="controls">
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input id="q" type="search" placeholder="Zoek recept of ingrediënt…" autocomplete="off">
    </div>
    <select class="sort" id="sort" aria-label="Sorteren">
      <option value="name">Naam A–Z</option>
      <option value="kcal-desc">Kcal ↓ (hoog)</option>
      <option value="kcal-asc">Kcal ↑ (laag)</option>
      <option value="protein-desc">Eiwit ↓ (hoog)</option>
      <option value="protein-asc">Eiwit ↑ (laag)</option>
      <option value="carbs-desc">Koolhydraten ↓ (hoog)</option>
      <option value="carbs-asc">Koolhydraten ↑ (laag)</option>
      <option value="fat-desc">Vet ↓ (hoog)</option>
      <option value="fat-asc">Vet ↑ (laag)</option>
      <option value="time">Snelste eerst</option>
    </select>
    <div class="chips" role="group" aria-label="Filters">
      <button class="chip" data-filter="fast" aria-pressed="false">≤ 30 min</button>
      <button class="chip" data-filter="protein" aria-pressed="false">≥ 30 g eiwit</button>
      <button class="chip" data-filter="light" aria-pressed="false">≤ 500 kcal</button>
      <button class="chip chip-adv" id="advBtn" aria-pressed="false" aria-expanded="false" aria-controls="filterPanel">⚙ Macro-filter</button>
    </div>
  </div>
  <div class="filter-panel" id="filterPanel" hidden>
    <div class="range" data-macro="kcal">
      <span>🔥 Calorieën <small>(kcal)</small></span>
      <div class="inputs">
        <input type="number" inputmode="numeric" min="0" step="10" placeholder="min" data-bound="min" aria-label="Calorieën minimaal">
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" step="10" placeholder="max" data-bound="max" aria-label="Calorieën maximaal">
      </div>
    </div>
    <div class="range" data-macro="protein">
      <span>💪 Eiwit <small>(g)</small></span>
      <div class="inputs">
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="min" data-bound="min" aria-label="Eiwit minimaal">
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="max" data-bound="max" aria-label="Eiwit maximaal">
      </div>
    </div>
    <div class="range" data-macro="carbs">
      <span>🌾 Koolhydraten <small>(g)</small></span>
      <div class="inputs">
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="min" data-bound="min" aria-label="Koolhydraten minimaal">
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="max" data-bound="max" aria-label="Koolhydraten maximaal">
      </div>
    </div>
    <div class="range" data-macro="fat">
      <span>🥑 Vet <small>(g)</small></span>
      <div class="inputs">
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="min" data-bound="min" aria-label="Vet minimaal">
        <span class="dash">–</span>
        <input type="number" inputmode="numeric" min="0" step="1" placeholder="max" data-bound="max" aria-label="Vet maximaal">
      </div>
    </div>
    <button class="reset" id="resetFilters" type="button">Wis macro-filter</button>
  </div>
</header>

<main>
  <noscript>
    <div class="notice">⚠️ Deze viewer draait geen JavaScript, dus zoeken, filteren en de receptdetails
    werken hier niet. Open het bestand in een echte browser (Safari of Chrome) voor de volledige versie.
    Hieronder zie je wel de volledige receptenlijst.</div>
  </noscript>
  <div class="grid" id="grid">
    <button class="card" data-slug="andijviestamppot-met-gehaktballen" aria-label="Andijviestamppot met gehaktballen">
      <img class="card-img" src="https://lasvnungqlqhodrnwizw.supabase.co/storage/v1/object/public/media-uploads/recipe-uploads/cmpl09xca01yubjuhtifx2484-ai-1779701435650-1.webp" alt="" loading="lazy">
      <div class="card-body">
        <h3>Andijviestamppot met gehaktballen</h3>
        <p class="desc">Stevige Nederlandse stamppot met flink wat andijvie, wortel en ui, aangevuld met sappige gehaktballen van mager rundergehakt. Lekker vullend, hoog in eiwit en perfect voor een sportieve avond.</p>
        <div class="macro-bar" role="img" aria-label="Energieverdeling: eiwit 27%, koolhydraten 48%, vet 25%" title="Energieverdeling: eiwit 27%, koolhydraten 48%, vet 25%"><span class="p" style="width:26.8%;background:var(--protein)"></span><span class="c" style="width:48.1%;background:var(--carbs)"></span><span class="f" style="width:25.0%;background:var(--fat)"></span></div>
        <div class="meta">
          <span>⏱ <b>40</b> min</span>
          <span>🔥 <b>554</b> kcal</span>
          <span>💪 <b>38,1</b> g eiwit</span>
        </div>
      </div>
    </button>
    <button class="card" data-slug="appel-kaneel-baked-oats-met-pindakaas-en-rozijnen" aria-label="Appel-kaneel baked oats met pindakaas en rozijnen">
      <img class="card-img" src="https://lasvnungqlqhodrnwizw.supabase.co/storage/v1/object/public/media-uploads/recipe-uploads/draft-ai-1779411347729-2.webp" alt="" loading="lazy">
      <div class="card-body">
        <h3>Appel-kaneel baked oats met pindakaas en rozijnen</h3>
        <p class="desc">Warme ovenhavermout met appel, kaneel, rozijnen en een vleugje pindakaas. Eiwitrijk door whey, kwark en ei, en super makkelijk te maken voor een voedzaam ontbijt.</p>
        <div class="macro-bar" role="img" aria-label="Energieverdeling: eiwit 28%, koolhydraten 48%, vet 23%" title="Energieverdeling: eiwit 28%, koolhydraten 48%, vet 23%"><span class="p" style="width:28.4%;background:var(--protein)"></span><span class="c" style="width:48.3%;background:var(--carbs)"></span><span class="f" style="width:23.3%;background:var(--fat)"></span></div>
        <div class="meta">
          <span>⏱ <b>35</b> min</span>
          <span>🔥 <b>803</b> kcal</span>
          <span>💪 <b>58,1</b> g eiwit</span>
        </div>
      </div>
    </button>
    <button class="card" data-slug="avocado-banaan-shake-met-honing" aria-label="Avocado banaan shake met honing">
      <img class="card-img" src="https://lasvnungqlqhodrnwizw.supabase.co/storage/v1/object/public/media-uploads/recipe-uploads/draft-ai-1779982627048-1.webp" alt="" loading="lazy">
      <div class="card-body">
        <h3>Avocado banaan shake met honing</h3>
        <p class="desc">Romige shake met halfvolle melk, vanille whey, avocado en banaan. In 2 minuten klaar in de blender, lekker als post-workout herstel of stevig tussendoortje met flinke eiwitstoot.</p>
        <div class="macro-bar" role="img" aria-label="Energieverdeling: eiwit 30%, koolhydraten 40%, vet 30%" title="Energieverdeling: eiwit 30%, koolhydraten 40%, vet 30%"><span class="p" style="width:29.9%;background:var(--protein)"></span><span class="c" style="width:40.0%;background:var(--carbs)"></span><span class="f" style="width:30.1%;background:var(--fat)"></span></div>
        <div class="meta">
          <span>⏱ <b>2</b> min</span>
          <span>🔥 <b>504</b> kcal</span>
          <span>💪 <b>40</b> g eiwit</span>
        </div>
      </div>

const $ = s => document.querySelector(s);
const grid = $('#grid'), overlay = $('#overlay'), sheet = $('#sheet');
const state = {
  q: '', sort: 'name', fast: false, protein: false, light: false,
  range: { kcal: {}, protein: {}, carbs: {}, fat: {} },
};
const bySlug = Object.fromEntries(DATA.map(r => [r.slug, r]));
const fmt = n => n == null ? '–' : (Math.round(n * 10) / 10).toLocaleString('nl-NL');
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

for (const r of DATA) {
  r.time = (r.prep || 0) + (r.cook || 0);
  r.search = (r.name + ' ' + r.desc + ' ' + r.ingredients.map(i => i.name).join(' ')).toLowerCase();
}

/* ---------- theme ---------- */
const themeBtn = $('#themeBtn');
const savedTheme = localStorage.getItem('theme');
if (savedTheme) document.documentElement.dataset.theme = savedTheme;
themeBtn.onclick = () => {
  const cur = document.documentElement.dataset.theme ||
    (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('theme', next);
};

/* ---------- list rendering ---------- */
function macroBarHTML(r, h) {
  const pk = (r.protein || 0) * 4, ck = (r.carbs || 0) * 4, fk = (r.fat || 0) * 9;
  const tot = pk + ck + fk;
  if (!tot) return '';
  const w = v => Math.max(2, v / tot * 100).toFixed(1) + '%';
  const label = `Energieverdeling: eiwit ${Math.round(pk/tot*100)}%, koolhydraten ${Math.round(ck/tot*100)}%, vet ${Math.round(fk/tot*100)}%`;
  return `<div class="${h ? 'energy-bar' : 'macro-bar'}" role="img" aria-label="${label}" title="${label}">
    <span class="p" style="width:${w(pk)};background:var(--protein)"></span>
    <span class="c" style="width:${w(ck)};background:var(--carbs)"></span>
    <span class="f" style="width:${w(fk)};background:var(--fat)"></span>
  </div>`;
}

function inRange(value, bounds) {
  return (bounds.min == null || value >= bounds.min) &&
         (bounds.max == null || value <= bounds.max);
}

function applyFilters() {
  const q = state.q.trim().toLowerCase();
  const rg = state.range;
  let list = DATA.filter(r =>
    (!q || r.search.includes(q)) &&
    (!state.fast || r.time <= 30) &&
    (!state.protein || (r.protein || 0) >= 30) &&
    (!state.light || (r.kcal || 0) <= 500) &&
    inRange(r.kcal || 0, rg.kcal) &&
    inRange(r.protein || 0, rg.protein) &&
    inRange(r.carbs || 0, rg.carbs) &&
    inRange(r.fat || 0, rg.fat)
  );
  const s = state.sort;
  const macroSort = { 'protein': 'protein', 'carbs': 'carbs', 'fat': 'fat', 'kcal': 'kcal' };
  list.sort((a, b) => {
    const [field, dir] = s.split('-');
    if (field === 'time') return a.time - b.time;
    if (macroSort[field]) {
      const diff = (a[field] || 0) - (b[field] || 0);
      return dir === 'asc' ? diff : -diff;
    }
    return a.name.localeCompare(b.name, 'nl');
  });
  return list;
}

function render() {
  const list = applyFilters();
  $('#count').textContent = `${list.length} van ${DATA.length} recepten`;
  $('#empty').hidden = list.length > 0;
  grid.innerHTML = list.map(r => `
    <button class="card" data-slug="${esc(r.slug)}" aria-label="${esc(r.name)}">
      <img class="card-img" src="${esc(r.img)}" alt="" loading="lazy">
      <div class="card-body">
        <h3>${esc(r.name)}</h3>
        <p class="desc">${esc(r.desc)}</p>
        ${macroBarHTML(r, false)}
        <div class="meta">
          <span>⏱ <b>${r.time}</b> min</span>
          <span>🔥 <b>${fmt(r.kcal)}</b> kcal</span>
          <span>💪 <b>${fmt(r.protein)}</b> g eiwit</span>
        </div>
      </div>
    </button>`).join('');
}

grid.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (card) location.hash = card.dataset.slug;
});

$('#q').addEventListener('input', e => { state.q = e.target.value; render(); });
$('#sort').addEventListener('change', e => { state.sort = e.target.value; render(); });
document.querySelectorAll('.chip[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    const k = chip.dataset.filter;
    state[k] = !state[k];
    chip.setAttribute('aria-pressed', state[k]);
    render();
  });
});

/* ---------- macro filter panel ---------- */
const advBtn = $('#advBtn'), filterPanel = $('#filterPanel');
advBtn.addEventListener('click', () => {
  const open = filterPanel.hasAttribute('hidden');
  filterPanel.toggleAttribute('hidden', !open);
  advBtn.setAttribute('aria-expanded', open);
});
filterPanel.querySelectorAll('input[type="number"]').forEach(input => {
  const macro = input.closest('.range').dataset.macro;
  const bound = input.dataset.bound;
  input.addEventListener('input', () => {
    const v = input.value.trim();
    if (v === '' || isNaN(parseFloat(v))) delete state.range[macro][bound];
    else state.range[macro][bound] = parseFloat(v);
    advBtn.setAttribute('aria-pressed', hasActiveRange());
    render();
  });
});
function hasActiveRange() {
  return Object.values(state.range).some(b => b.min != null || b.max != null);
}
$('#resetFilters').addEventListener('click', () => {
  state.range = { kcal: {}, protein: {}, carbs: {}, fat: {} };
  filterPanel.querySelectorAll('input[type="number"]').forEach(i => { i.value = ''; });
  advBtn.setAttribute('aria-pressed', 'false');
  render();
});

/* ---------- detail ---------- */
let currentServings = 1;

function amountText(ing, servings) {
  if (ing.gServ == null) return ing.amount || '';
  const v = ing.gServ * servings;
  const rounded = v >= 10 ? Math.round(v) : Math.round(v * 10) / 10;
  return `${rounded.toLocaleString('nl-NL')} ${ing.unit}`;
}

function renderIngredients(r) {
  $('#ingList').innerHTML = r.ingredients.map((ing, i) => `
    <li>
      <label>
        <input type="checkbox" data-i="${i}">
        <span class="ing-name">${esc(ing.name)}${ing.brand ? ` <span class="brand">· ${esc(ing.brand)}</span>` : ''}</span>
      </label>
      ${ing.optional ? '<span class="badge">optioneel</span>' : ''}
      ${ing.seasoning ? '<span class="badge">op smaak</span>' : ''}
      <span class="ing-amt">${esc(amountText(ing, currentServings))}</span>
    </li>`).join('');
}

function openRecipe(r) {
  currentServings = r.servings || 1;
  const total = r.time;
  sheet.innerHTML = `
    <div class="hero">
      <img src="${esc(r.img)}" alt="${esc(r.name)}">
      <button class="close-btn" id="closeBtn" aria-label="Sluiten">✕</button>
    </div>
    <div class="sheet-body">
      <h2>${esc(r.name)}</h2>
      <p class="desc-full">${esc(r.desc)}</p>
      <div class="facts">
        <span class="fact">⏱ <b>${r.prep ?? 0}</b> min prep</span>
        <span class="fact">🍳 <b>${r.cook ?? 0}</b> min koken</span>
        <span class="fact">Σ <b>${total}</b> min</span>
        ${r.servDesc ? `<span class="fact">🍽 ${esc(r.servDesc)}</span>` : ''}
      </div>

      <div class="tiles">
        <div class="tile"><div class="lbl">Calorieën</div><div class="val">${fmt(r.kcal)} <small>kcal</small></div></div>
        <div class="tile"><div class="lbl"><i style="background:var(--protein)"></i>Eiwit</div><div class="val">${fmt(r.protein)} <small>g</small></div></div>
        <div class="tile"><div class="lbl"><i style="background:var(--carbs)"></i>Koolhydraten</div><div class="val">${fmt(r.carbs)} <small>g</small></div></div>
        <div class="tile"><div class="lbl"><i style="background:var(--fat)"></i>Vet</div><div class="val">${fmt(r.fat)} <small>g</small></div></div>
      </div>
      ${macroBarHTML(r, true)}
      <div class="legend">
        <span><i style="background:var(--protein)"></i>Eiwit</span>
        <span><i style="background:var(--carbs)"></i>Koolhydraten</span>
        <span><i style="background:var(--fat)"></i>Vet</span>
      </div>
      <p class="energy-note">Voedingswaarden per portie · verdeling op basis van energie (kcal)</p>

      <div class="sec-head">
        <h4>Ingrediënten</h4>
        <div class="stepper" aria-label="Aantal porties">
          <button id="minus" aria-label="Minder porties">−</button>
          <span class="n"><b id="servN">${currentServings}</b> ${currentServings === 1 ? 'portie' : 'porties'}</span>
          <button id="plus" aria-label="Meer porties">+</button>
        </div>
      </div>
      <ul class="ing-list" id="ingList"></ul>

      <div class="sec-head"><h4>Bereiding</h4></div>
      <ol class="steps-list" id="stepsList">
        ${r.steps.map(s => `
          <li>
            <span class="step-num">${s.n}</span>
            <span class="step-text">${esc(s.text)}</span>
          </li>`).join('')}
      </ol>
    </div>`;

  renderIngredients(r);
  overlay.classList.add('open');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';

  $('#closeBtn').onclick = closeRecipe;
  $('#minus').onclick = () => setServings(r, currentServings - 1);
  $('#plus').onclick = () => setServings(r, currentServings + 1);
  $('#ingList').addEventListener('change', e => {
    const li = e.target.closest('li');
    if (li) li.classList.toggle('checked', e.target.checked);
  });
  $('#stepsList').addEventListener('click', e => {
    const li = e.target.closest('li');
    if (li) li.classList.toggle('done');
  });
}

function setServings(r, n) {
  currentServings = Math.min(12, Math.max(1, n));
  $('#servN').textContent = currentServings;
  $('#servN').nextSibling.textContent = ' ' + (currentServings === 1 ? 'portie' : 'porties');
  $('#minus').disabled = currentServings <= 1;
  $('#plus').disabled = currentServings >= 12;
  const checked = [...document.querySelectorAll('#ingList input')].map(c => c.checked);
  renderIngredients(r);
  document.querySelectorAll('#ingList input').forEach((c, i) => {
    c.checked = checked[i] || false;
    c.closest('li').classList.toggle('checked', c.checked);
  });
}

function closeRecipe() {
  if (location.hash) history.back();
  else hideOverlay();
}
function hideOverlay() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  sheet.innerHTML = '';
}

overlay.addEventListener('click', e => { if (e.target === overlay) closeRecipe(); });
addEventListener('keydown', e => {
  if (e.key === 'Escape' && overlay.classList.contains('open')) closeRecipe();
});

function onHash() {
  const slug = decodeURIComponent(location.hash.slice(1));
  const r = bySlug[slug];
  if (r) openRecipe(r);
  else hideOverlay();
}
addEventListener('hashchange', onHash);

render();
onHash();
</script>
</body>
</html>
